<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Quick Recorder — Enable Microphone</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 64px auto;
      padding: 24px;
      color: #1a1a1a;
      line-height: 1.5;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { margin: 8px 0 16px; color: #555; }
    button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #dc2626; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    #status.ok { background: #d1fae5; color: #065f46; }
    #status.err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>🎤 Enable Microphone</h1>
  <p>Quick Recorder needs access to your microphone to record your voice along with the screen. Click the button below — Chrome will show a permission prompt. Choose <strong>Allow</strong>.</p>
  <p>After granting, this tab will close automatically and recording will work going forward.</p>
  <button id="grant">Grant Microphone Access</button>
  <div id="status"></div>
  <script src="permissions.js"></script>
</body>
</html>
